<div class="container">
  <form #form="ngForm" class="form" (ngSubmit)="signIn()">
    <img class="logo" src="/assets/images/logo.jpg" />
    <div class="sign-in">Sign In</div>
    <div class="sub-text">to acquire awesome bots</div>
    <input
      name="email"
      #email="ngModel"
      required
      [(ngModel)]="credentials.email"
      placeholder="Email Address"
      type="text"
    /> 
    <em class="error" *ngIf="email.invalid && email.touched">Email is required</em>
    <input
      name="password"
      #password="ngModel"
      required
      [(ngModel)]="credentials.password"
      placeholder="Password"
      type="password"
    />
    <em class="error" *ngIf="password.invalid && password.touched">Password is required</em>
    <div class="buttons">
      <button [disabled]="form.invalid" type="submit"class="button cta">
        Sign In
      </button>
    </div>
    <div class = "signInError" *ngIf="signInError">
     Sign in failed. Please check your credentials and try again.
    </div>
  </form>
</div>
