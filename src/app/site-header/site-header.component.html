<div class="container">
  <div class="left">
    <img class="logo" src="/assets/images/logo.jpg" alt="Logo" />
    <a routerLink="/home" routerLinkActive="active">Home</a>
    <a routerLink="/catalog" routerLinkActive="active">Catalog</a>
    <a routerLink="/orders" routerLinkActive="active" *ngIf="user">Orders</a>
    <div class="cart">
      <a routerLink="/cart" routerLinkActive="active">Cart</a>
    </div>
  </div>
  <div class="right" *ngIf="!user">
    <a routerLink="/sign-in" routerLinkActive="active">Sign In</a>
    <a routerLink="/register" routerLinkActive="active" class="cta">Register</a>
  </div>
  <div class="right" *ngIf="user">
    <img src="/assets/images/profile.png" (click) = "toggleSignOut()" alt="Profile" class="profile-pic" />
    <div class="sign-out" *ngIf="showSignOut">
      <button class="button" (click)="signOut()">Sign Out</button> 
    </div>  
  </div>

</div>
